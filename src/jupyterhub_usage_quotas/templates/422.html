{% extends "templates/error.html" %}

{% block main %}
<div class="error">
{% block error_detail %}
{% if message_html %}
  <p>{{ message_html | safe }}</p>
{% elif message %}
  <p>{{ message }}</p>
{% endif %}
{% endblock error_detail %}
</div>
{% endblock main %}
{% block script %}
  {{ super() }}
{% endblock script %}
